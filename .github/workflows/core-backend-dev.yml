name: core-backend-auto-deploy

# Trigger on pushes to the devops-azure branch and allow manual triggers
on:
  push:
    branches:
      [dev]
    paths:
      - 'apps/core-backend/**'
      - 'packages/**'
      - '.github/workflows/core-backend-dev.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      
  workflow_dispatch:      

jobs:
  build-and-deploy:
    if: true   # set false to disable this job
    runs-on: ubuntu-latest
    permissions: 
      id-token: write    # Required for OIDC token (Azure login)
      contents: read    # Required to access repo

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Docker login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DEVCOREBACKEND_REGISTRY_USERNAME }}
          password: ${{ secrets.DEVCOREBACKEND_REGISTRY_PASSWORD }}

      # Buildx setup for cross-platform build
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push Docker image with environment variables
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/core-backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: harithatk/trustmed-dev-core-backend:${{ github.sha }}

      # Azure login
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DEVCOREBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DEVCOREBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DEVCOREBACKEND_AZURE_SUBSCRIPTION_ID }}

      # Run DB migrations explicitly
      - name: Run database migrations
        run: |
          az containerapp exec \
            --name dev-core-backend \
            --resource-group trustmed-health-dev \
            --command "pnpm migration:run"

      # Deploy to Container App
      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name dev-core-backend \
            --resource-group trustmed-health-dev \
            --image harithatk/trustmed-dev-core-backend:${{ github.sha }}

  migration:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DEVCOREBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DEVCOREBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DEVCOREBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Update migration job image
        run: |
          MIGRATION_IMAGE=harithatk/trustmed-dev-core-backend:${{ github.sha }}
          
          if az containerapp job show \
                --name dev-core-backend-migrations \
                --resource-group trustmed-health-dev &>/dev/null; then
            echo "Updating migration job with latest image..."
            az containerapp job update \
              --name dev-core-backend-migrations \
              --resource-group trustmed-health-dev \
              --image $MIGRATION_IMAGE
          else
            echo "Migration job not found! Please create it manually first."
            exit 1

      - name: Run migration job
        run: |
          MIGRATION_IMAGE=harithatk/trustmed-dev-core-backend:${{ github.sha }}
          az containerapp job run \
            --name dev-core-backend-migrations \
            --resource-group trustmed-health-dev \
            --image $MIGRATION_IMAGE \
            --command "pnpm migration:run"