name: core-frontend-auto-deploy

# Trigger on pushes to the devops-azure branch and allow manual triggers
on:
  push:
    branches:
      - devops-azure
    paths:
      - "apps/core-frontend/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write    # Required for OIDC token (Azure login)
      contents: read    # Required to access repo

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Docker login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.COREFRONTEND_REGISTRY_USERNAME }}
          password: ${{ secrets.COREFRONTEND_REGISTRY_PASSWORD }}

      # 3️⃣ Buildx setup for cross-platform build
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4️⃣ Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/core-frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: harithatk/trustmed-dev-core-frontend:${{ github.sha }}

      # 5️⃣ Azure login
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.COREFRONTEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.COREFRONTEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.COREFRONTEND_AZURE_SUBSCRIPTION_ID }}

      # 6️⃣ Deploy to Container App
      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name core-frontend \
            --resource-group trustmed-health-dev \
            --image harithatk/trustmed-dev-core-frontend:${{ github.sha }}