name: core-frontend-dev

on:
  push:
    branches: [ devops-azure ]
    paths:
      - "apps/core-frontend/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"

env:
  IMAGE_NAME: harithatk/trustmed-dev-core-frontend
  CONTAINER_APP: core-frontend
  RESOURCE_GROUP: trustmed-health-dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🐳 Docker login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_DEV }}
          password: ${{ secrets.DOCKERHUB_TOKEN_DEV }}

      # 🔥 Buildx for amd64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🐳 Build and push image
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/core-frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}:latest

      # 🔐 Azure login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 🚀 Update container app
      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name $CONTAINER_APP \
            --resource-group $RESOURCE_GROUP \
            --image $IMAGE_NAME:latest