version: "3.9"

services:
  gateway:
    build: .
    container_name: trustmed-gateway
    ports:
      - "4001:4001"
    volumes:
      # Mount Fabric test-network folder
      - /home/ubuntu/TrustMed/blockchain/fabric-samples/fabric-samples/test-network:/fabric
      # Mount Fabric binaries 
      - /home/ubuntu/TrustMed/blockchain/fabric-samples/fabric-samples/bin:/fabric/bin
    environment:
      - PORT=4001
      - FABRIC_PATH=/fabric
    restart: always